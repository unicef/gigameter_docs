name: Update deployment stats

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system fonts
        run: sudo apt-get install -y fonts-lato

      - name: Install Python dependencies
        run: pip install requests Pillow

      - name: Update stats and generate country grid
        env:
          GIGA_API_KEY: ${{ secrets.GIGAMETER_API_KEY }}
        run: python .github/scripts/update_stats.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/assets/country-grid.png
          git diff --cached --quiet || git commit -m "chore: update deployment stats [skip ci]"
          git push
